
            }

            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', () => {
                    successModal.classList.add('opacity-0');
                    successModal.querySelector('.transform').classList.add('scale-95');
                    setTimeout(() => {
                        successModal.classList.add('hidden');
                    }, 300);
                });
            }
        });
    </script>
</body>
</html>
